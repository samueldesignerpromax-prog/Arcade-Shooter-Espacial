<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Space Shooter - Arena Triangular</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <!-- Tela de Início -->
        <div id="startScreen" class="start-screen">
            <div class="start-card">
                <h1>🚀 SPACE SHOOTER 🚀</h1>
                <p>Destrua as naves inimigas e sobreviva!</p>
                <div class="controls-demo">
                    <div class="control-icon">🎮</div>
                    <span>Botões na tela</span>
                    <div class="control-icon">⌨️</div>
                    <span>Teclado</span>
                </div>
                <button id="startButton" class="start-btn">▶ INICIAR JOGO</button>
            </div>
        </div>
        
        <!-- UI do Jogo -->
        <div class="ui-panel hidden" id="gameUI">
            <div class="stat-card">
                <div class="stat-icon">❤️</div>
                <div class="stat-value" id="livesValue">3</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-value" id="scoreValue">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💀</div>
                <div class="stat-value" id="killsValue">0</div>
            </div>
        </div>
        
        <!-- Controles Mobile -->
        <div class="mobile-controls hidden" id="mobileControls">
            <div class="control-stick">
                <button class="ctrl-btn" id="btnUp">▲</button>
                <div class="ctrl-row">
                    <button class="ctrl-btn" id="btnLeft">◀</button>
                    <button class="ctrl-btn" id="btnDown">▼</button>
                    <button class="ctrl-btn" id="btnRight">▶</button>
                </div>
            </div>
            <div class="control-shoot">
                <button class="ctrl-btn shoot-btn" id="btnShoot">🔫</button>
            </div>
        </div>
        
        <!-- Tela de Game Over -->
        <div id="gameOverlay" class="game-overlay hidden">
            <div class="overlay-card">
                <h2>💀 GAME OVER 💀</h2>
                <div class="final-stats">
                    <p>Pontuação: <span id="finalScore">0</span></p>
                    <p>Inimigos: <span id="finalKills">0</span></p>
                </div>
                <button id="restartButton" class="action-btn">🔄 JOGAR NOVAMENTE</button>
            </div>
        </div>
        
        <!-- Instruções -->
        <div class="instructions hidden" id="instructions">
            <span>← → ↑ ↓</span> Mover • <span>Clique/Botão</span> Atirar
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
